<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Asaf Dayan | CV</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <style>
      :root {
        color-scheme: dark;
        --ink: #f8fbff;
        --muted: rgba(248, 251, 255, 0.62);
        --line: rgba(191, 220, 232, 0.16);
        --panel: rgba(2, 5, 9, 0.52);
        --accent: #5ca6ca;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body,
      #vanta-bg {
        width: 100%;
        min-height: 100%;
        margin: 0;
      }

      body {
        min-height: 100vh;
        overflow-x: hidden;
        background: #05070d;
        font-family: "Aptos Display", Satoshi, Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--ink);
      }

      #vanta-bg {
        position: fixed;
        inset: 0;
        z-index: -2;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        z-index: -1;
        background:
          linear-gradient(90deg, rgba(255, 255, 255, 0.04) 1px, transparent 1px),
          linear-gradient(180deg, rgba(255, 255, 255, 0.035) 1px, transparent 1px),
          radial-gradient(circle at 52% 46%, rgba(92, 166, 202, 0.1), transparent 34%),
          linear-gradient(180deg, rgba(5, 7, 13, 0.24), rgba(5, 7, 13, 0.82));
        background-size: 72px 72px, 72px 72px, auto, auto;
      }

      main {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 32px;
      }

      .intro {
        width: min(620px, 100%);
        padding: clamp(26px, 5vw, 46px);
        border: 1px solid var(--line);
        border-radius: 18px;
        background: var(--panel);
        box-shadow: 0 30px 90px rgba(0, 0, 0, 0.42);
        backdrop-filter: blur(20px);
      }

      h1 {
        min-height: 0.98em;
        margin: 0;
        font-size: clamp(2.8rem, 7vw, 5.2rem);
        font-weight: 850;
        line-height: 0.94;
        letter-spacing: 0;
      }

      .cursor {
        display: inline-block;
        width: 0.08em;
        height: 0.78em;
        margin-left: 0.08em;
        border-radius: 999px;
        background: var(--accent);
        transform: translateY(0.08em);
        animation: blink 900ms steps(1) infinite;
        box-shadow: 0 0 18px rgba(92, 166, 202, 0.6);
      }

      @keyframes blink {
        50% {
          opacity: 0;
        }
      }

      p {
        max-width: 34rem;
        margin: 22px 0 0;
        color: var(--muted);
        font-size: clamp(1rem, 1.7vw, 1.14rem);
        font-weight: 640;
        line-height: 1.7;
      }

      .actions {
        display: flex;
        margin-top: 32px;
      }

      a {
        color: inherit;
      }

      .button {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        justify-content: center;
        min-height: 48px;
        padding: 0 20px;
        border: 1px solid rgba(191, 220, 232, 0.28);
        border-radius: 999px;
        background: rgba(248, 251, 255, 0.94);
        color: #071016;
        font-size: 0.98rem;
        font-weight: 800;
        text-decoration: none;
        box-shadow: 0 12px 34px rgba(4, 11, 18, 0.36);
        transition: transform 160ms ease, background 160ms ease, border-color 160ms ease, box-shadow 160ms ease;
      }

      .button::after {
        content: "→";
        font-size: 1.1rem;
        line-height: 1;
      }

      .button:hover {
        transform: translateY(-1px);
        background: #ffffff;
        box-shadow: 0 16px 42px rgba(4, 11, 18, 0.46);
      }

      @media (max-width: 640px) {
        main {
          padding: 18px;
        }

        .intro {
          border-radius: 16px;
        }

        .button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div id="vanta-bg" aria-hidden="true"></div>
    <main>
      <section class="intro" aria-labelledby="page-title">
        <h1 id="page-title"><span id="typed-name"></span><span class="cursor" aria-hidden="true"></span></h1>
        <p>Multidisciplinary system engineer.</p>
        <div class="actions">
          <a class="button" href="cv.pdf" target="_blank" rel="noopener">View CV</a>
        </div>
      </section>
    </main>
    <script src="../three.r134.min.js"></script>
    <script src="../vanta.clouds2.min.js"></script>
    <script>
      VANTA.CLOUDS2({
        el: "#vanta-bg",
        mouseControls: true,
        touchControls: true,
        gyroControls: false,
        minHeight: 200.0,
        minWidth: 200.0,
        scale: 1.0,
        backgroundColor: 0x0,
        skyColor: 0x5ca6ca,
        cloudColor: 0x334d80,
        lightColor: 0xffffff,
        speed: 1.0,
        texturePath: "../gallery/noise.png",
      })

      const name = "Asaf Dayan"
      const typedName = document.querySelector("#typed-name")
      let index = 0

      function typeName() {
        typedName.textContent = name.slice(0, index)
        if (index < name.length) {
          index += 1
          window.setTimeout(typeName, index === 1 ? 280 : 78)
        }
      }

      typeName()
    </script>
  </body>
</html>

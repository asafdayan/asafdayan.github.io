<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Asaf Dayan | CV</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <style>
      :root {
        color-scheme: dark;
        --ink: #f8fbff;
        --muted: rgba(248, 251, 255, 0.72);
        --line: rgba(255, 255, 255, 0.18);
        --panel: rgba(5, 7, 13, 0.42);
        --accent: #5ca6ca;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body,
      #vanta-bg {
        width: 100%;
        min-height: 100%;
        margin: 0;
      }

      body {
        min-height: 100vh;
        overflow-x: hidden;
        background: #05070d;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--ink);
      }

      #vanta-bg {
        position: fixed;
        inset: 0;
        z-index: -2;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        z-index: -1;
        background:
          radial-gradient(circle at 50% 45%, rgba(92, 166, 202, 0.12), transparent 34%),
          linear-gradient(180deg, rgba(5, 7, 13, 0.18), rgba(5, 7, 13, 0.72));
      }

      main {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 32px;
      }

      .intro {
        width: min(720px, 100%);
        padding: clamp(28px, 6vw, 56px);
        border: 1px solid var(--line);
        border-radius: 28px;
        background: var(--panel);
        box-shadow: 0 28px 90px rgba(0, 0, 0, 0.34);
        backdrop-filter: blur(18px);
      }

      .eyebrow {
        margin: 0 0 18px;
        color: var(--accent);
        font-size: 0.82rem;
        font-weight: 800;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      h1 {
        max-width: 10ch;
        margin: 0;
        font-size: clamp(3rem, 11vw, 7.4rem);
        line-height: 0.9;
        letter-spacing: 0;
      }

      p {
        max-width: 48rem;
        margin: 24px 0 0;
        color: var(--muted);
        font-size: clamp(1.05rem, 2vw, 1.28rem);
        line-height: 1.65;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 34px;
      }

      a {
        color: inherit;
      }

      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 46px;
        padding: 0 18px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 999px;
        background: #f8fbff;
        color: #091018;
        font-weight: 800;
        text-decoration: none;
        transition: transform 160ms ease, background 160ms ease, border-color 160ms ease;
      }

      .button:hover {
        transform: translateY(-1px);
        background: #ffffff;
      }

      .button.secondary {
        background: rgba(255, 255, 255, 0.08);
        color: var(--ink);
      }

      .button.secondary:hover {
        border-color: rgba(255, 255, 255, 0.38);
        background: rgba(255, 255, 255, 0.14);
      }

      @media (max-width: 640px) {
        main {
          padding: 18px;
        }

        .intro {
          border-radius: 22px;
        }

        .actions {
          flex-direction: column;
        }

        .button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div id="vanta-bg" aria-hidden="true"></div>
    <main>
      <section class="intro" aria-labelledby="page-title">
        <p class="eyebrow">Curriculum Vitae</p>
        <h1 id="page-title">Hey, I’m Asaf.</h1>
        <p>
          I’m an electrical engineering student building practical tools, studying waves and systems,
          and generally trying to make complicated things feel usable.
        </p>
        <div class="actions">
          <a class="button" href="cv.pdf" download>Download CV</a>
          <a class="button secondary" href="cv.pdf" target="_blank" rel="noopener">Open in browser</a>
        </div>
      </section>
    </main>
    <script src="../three.r134.min.js"></script>
    <script src="../vanta.clouds2.min.js"></script>
    <script>
      VANTA.CLOUDS2({
        el: "#vanta-bg",
        mouseControls: true,
        touchControls: true,
        gyroControls: false,
        minHeight: 200.0,
        minWidth: 200.0,
        scale: 1.0,
        backgroundColor: 0x0,
        skyColor: 0x5ca6ca,
        cloudColor: 0x334d80,
        lightColor: 0xffffff,
        speed: 1.0,
        texturePath: "../gallery/noise.png",
      })
    </script>
  </body>
</html>

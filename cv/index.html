<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Asaf Dayan | CV</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <style>
      :root {
        color-scheme: dark;
        --ink: #f8fbff;
        --muted: rgba(248, 251, 255, 0.62);
        --line: rgba(191, 220, 232, 0.16);
        --panel: rgba(2, 5, 9, 0.52);
        --accent: #5ca6ca;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body,
      #vanta-bg {
        width: 100%;
        min-height: 100%;
        margin: 0;
      }

      body {
        min-height: 100vh;
        overflow-x: hidden;
        background: #05070d;
        font-family: "Aptos Display", Satoshi, Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--ink);
        transition: opacity 260ms ease, filter 260ms ease, transform 260ms ease;
      }

      body.opening {
        opacity: 0;
        filter: blur(8px);
        transform: translateY(-12px);
      }

      #vanta-bg {
        position: fixed;
        inset: 0;
        z-index: -2;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        z-index: -1;
        background:
          linear-gradient(90deg, rgba(255, 255, 255, 0.04) 1px, transparent 1px),
          linear-gradient(180deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(0, 0, 0, 0.28) 1px, transparent 1px),
          linear-gradient(180deg, rgba(0, 0, 0, 0.24) 1px, transparent 1px),
          radial-gradient(circle at 52% 46%, rgba(92, 166, 202, 0.1), transparent 34%),
          linear-gradient(180deg, rgba(5, 7, 13, 0.34), rgba(5, 7, 13, 0.88));
        background-size: 72px 72px, 72px 72px, 72px 72px, 72px 72px, auto, auto;
      }

      main {
        min-height: 150vh;
      }

      .intro {
        min-height: 100vh;
        width: min(620px, 100%);
        margin: 0 auto;
        padding: clamp(112px, 27vh, 220px) 32px 32px;
        text-align: center;
      }

      h1 {
        min-height: 0.98em;
        margin: 0;
        font-size: clamp(2.8rem, 7vw, 5.2rem);
        font-weight: 850;
        line-height: 0.94;
        letter-spacing: 0;
      }

      .cursor {
        display: inline-block;
        width: 0.08em;
        height: 0.78em;
        margin-left: 0.08em;
        border-radius: 999px;
        background: var(--accent);
        transform: translateY(0.08em);
        animation: blink 900ms steps(1) infinite;
        box-shadow: 0 0 18px rgba(92, 166, 202, 0.6);
      }

      @keyframes blink {
        50% {
          opacity: 0;
        }
      }

      p {
        max-width: 34rem;
        margin: 22px auto 0;
        color: var(--muted);
        font-size: clamp(1rem, 1.7vw, 1.14rem);
        font-weight: 640;
        line-height: 1.7;
      }

      .scroll-hint {
        position: fixed;
        left: 50%;
        bottom: clamp(34px, 8vh, 76px);
        margin: 0;
        color: rgba(248, 251, 255, 0.52);
        font-size: 0.82rem;
        font-weight: 780;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        transform: translateX(-50%);
        white-space: nowrap;
      }

      a {
        color: inherit;
      }

      @media (max-width: 640px) {
        .intro {
          padding: clamp(116px, 24vh, 180px) 18px 18px;
        }
      }
    </style>
  </head>
  <body>
    <div id="vanta-bg" aria-hidden="true"></div>
    <main>
      <section class="intro" aria-labelledby="page-title">
        <h1 id="page-title"><span id="typed-name"></span><span class="cursor" aria-hidden="true"></span></h1>
        <p>Multidisciplinary system engineer.</p>
        <p class="scroll-hint">Scroll down to open CV</p>
      </section>
    </main>
    <script src="../three.r134.min.js"></script>
    <script src="../vanta.clouds2.min.js"></script>
    <script>
      VANTA.CLOUDS2({
        el: "#vanta-bg",
        mouseControls: true,
        touchControls: true,
        gyroControls: false,
        minHeight: 200.0,
        minWidth: 200.0,
        scale: 1.0,
        backgroundColor: 0x0,
        skyColor: 0x5ca6ca,
        cloudColor: 0x334d80,
        lightColor: 0xffffff,
        speed: 1.0,
        texturePath: "../gallery/noise.png",
      })

      const name = "Asaf Dayan"
      const typedName = document.querySelector("#typed-name")
      let index = 0

      function typeName() {
        typedName.textContent = name.slice(0, index)
        if (index < name.length) {
          index += 1
          window.setTimeout(typeName, index === 1 ? 280 : 78)
        }
      }

      typeName()

      let openStarted = false

      function openCv() {
        if (openStarted) return
        openStarted = true
        document.body.classList.add("opening")
        window.setTimeout(() => {
          window.location.href = "cv.pdf"
        }, 220)
      }

      window.addEventListener("scroll", () => {
        if (window.scrollY > Math.min(window.innerHeight * 0.34, 280)) openCv()
      }, { passive: true })

      window.addEventListener("keydown", (event) => {
        if (["ArrowDown", "PageDown", "Space", "End"].includes(event.code)) openCv()
      })
    </script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>asafdayan</title>
    <style>
      html,
      body,
      #globe {
        width: 100%;
        height: 100%;
        margin: 0;
      }

      body {
        overflow: hidden;
        background: #05070d;
      }

      #globe {
        position: fixed;
        inset: 0;
      }
    </style>
  </head>
  <body>
    <div id="globe" aria-hidden="true"></div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.globe.min.js"></script>
    <script>
      VANTA.GLOBE({
        el: "#globe",
        mouseControls: true,
        touchControls: true,
        gyroControls: false,
        minHeight: 200.0,
        minWidth: 200.0,
        scale: 1.0,
        scaleMobile: 1.0,
        color: 0x3d8cff,
        color2: 0x00d6a3,
        backgroundColor: 0x05070d,
        size: 1.15,
      })
    </script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>asafdayan</title>
    <style>
      html,
      body,
      #vanta-bg {
        width: 100%;
        height: 100%;
        margin: 0;
      }

      body {
        overflow: hidden;
        background: #05070d;
      }

      #vanta-bg {
        position: fixed;
        inset: 0;
      }
    </style>
  </head>
  <body>
    <div id="vanta-bg" aria-hidden="true"></div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.clouds2.min.js"></script>
    <script src="three.r134.min.js"></script>
<script src="vanta.clouds2.min.js"></script>
<script>
VANTA.CLOUDS2({
  el:"#vanta-bg",
  mouseControls: true,
  touchControls: true,
  gyroControls: false,
  minHeight: 200.00,
  minWidth: 200.00,
  scale: 1.00,
  texturePath: "./gallery/noise.png"
})
</script>
    </script>
  </body>
</html>
